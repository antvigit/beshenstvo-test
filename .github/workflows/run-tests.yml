name: Run Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Start Selenium Grid
        run: |
          docker compose up -d
          sleep 10

      - name: Wait for Selenium Grid to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:4444/status | grep -q '"ready":true'; then
              echo "Grid is ready"
              break
            fi
            echo "Waiting for Grid..."
            sleep 2
          done

      - name: Run tests for ${{ matrix.browser }}
        run: |
          mvn clean test -Dbrowser=${{ matrix.browser }} -Dgrid.url=http://localhost:4444/wd/hub || true

      - name: Wait for Allure results
        run: |
          while [ ! -d target/allure-results ] || [ -z "$(ls -A target/allure-results 2>/dev/null)" ]; do
            echo "Waiting for allure-results..."
            sleep 5
          done

      - name: Generate Allure report
        run: mvn allure:report

      - name: Start Python HTTP server
        run: |
          cd target/site/allure-maven-plugin/
          python3 -m http.server 8080 &
          sleep 5

      - name: Install Playwright
        run: |
          npm install -g playwright
          npx playwright install --with-deps chromium

      - name: Take screenshot
        run: |
          npx playwright screenshot \
            --viewport-size=1280,720 \
            --timeout=20000 \
            --wait-for-timeout=5000 \
            http://localhost:8080 \
            allure-report.png

      - name: Send screenshot + completion message for ${{ matrix.browser }}
        run: |
          # 1. Отправляем скриншот с подписью и ссылкой
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto \
            -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -F photo=@allure-report.png \
            -F caption="📊 Allure отчёт для ${{ matrix.browser }}%0A🔗 Ссылка: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # 2. Отправляем сообщение о завершении для этого браузера
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="✅ Тесты (${{ matrix.browser }}) завершены."

  finalize:
    runs-on: ubuntu-latest
    needs: test
    if: always()  # выполняется даже если часть тестов упала
    steps:
      - name: Send final completion message
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="✅ Все тесты завершены!%0A💡 Можете повторить запрос командой /run"