name: Run Tests

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Telegram chat ID'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Send initial message for ${{ matrix.browser }}
        id: init_msg
        run: |
          RESP=$(curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ github.event.inputs.chat_id }} \
            -d text="🚀 Запускаю тесты для ${{ matrix.browser }}...")
          echo "message_id=$(echo $RESP | jq '.result.message_id')" >> $GITHUB_OUTPUT
          echo "chat_id=${{ github.event.inputs.chat_id }}" >> $GITHUB_OUTPUT
          echo "token=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> $GITHUB_OUTPUT

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Start Selenium Grid
        run: |
          docker compose up -d
          sleep 10

      - name: Wait for Selenium Grid to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:4444/status | grep -q '"ready":true'; then
              echo "Grid is ready"
              break
            fi
            echo "Waiting for Grid..."
            sleep 2
          done

      - name: Edit message - tests started
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ steps.init_msg.outputs.token }}/editMessageText \
            -d chat_id=${{ steps.init_msg.outputs.chat_id }} \
            -d message_id=${{ steps.init_msg.outputs.message_id }} \
            -d text="🚀 Запускаю тесты для ${{ matrix.browser }}...\n⏳ Выполняются тесты..."

      - name: Run tests for ${{ matrix.browser }}
        run: |
          mvn clean test -Dbrowser=${{ matrix.browser }} -Dgrid.url=http://localhost:4444/wd/hub || true

      - name: Edit message - tests finished
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ steps.init_msg.outputs.token }}/editMessageText \
            -d chat_id=${{ steps.init_msg.outputs.chat_id }} \
            -d message_id=${{ steps.init_msg.outputs.message_id }} \
            -d text="🚀 Запускаю тесты для ${{ matrix.browser }}...\n✅ Тесты завершены.\n📊 Генерирую отчёт..."

      - name: Wait for Allure results
        run: |
          while [ ! -d target/allure-results ] || [ -z "$(ls -A target/allure-results 2>/dev/null)" ]; do
            echo "Waiting for allure-results..."
            sleep 5
          done

      - name: Generate Allure report
        run: mvn allure:report

      - name: Edit message - report generated
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ steps.init_msg.outputs.token }}/editMessageText \
            -d chat_id=${{ steps.init_msg.outputs.chat_id }} \
            -d message_id=${{ steps.init_msg.outputs.message_id }} \
            -d text="🚀 Запускаю тесты для ${{ matrix.browser }}...\n✅ Тесты завершены.\n📊 Отчёт сгенерирован.\n📸 Делаю скриншот..."

      - name: Start Python HTTP server
        run: |
          cd target/site/allure-maven-plugin/
          python3 -m http.server 8080 &
          sleep 5

      - name: Wait for server to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server..."
            sleep 2
          done

      - name: Install Playwright
        run: |
          npm install -g playwright
          npx playwright install --with-deps chromium

      - name: Take screenshot
        run: |
          npx playwright screenshot \
            --viewport-size=1280,720 \
            --timeout=30000 \
            --wait-for-timeout=10000 \
            http://localhost:8080 \
            allure-report.png

      - name: Edit message - screenshot done
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ steps.init_msg.outputs.token }}/editMessageText \
            -d chat_id=${{ steps.init_msg.outputs.chat_id }} \
            -d message_id=${{ steps.init_msg.outputs.message_id }} \
            -d text="🚀 Запускаю тесты для ${{ matrix.browser }}...\n✅ Тесты завершены.\n📊 Отчёт сгенерирован.\n📸 Скриншот отправлен."

      - name: Send screenshot
        run: |
          if [ -f allure-report.png ]; then
            curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto \
              -F chat_id=${{ github.event.inputs.chat_id }} \
              -F photo=@allure-report.png \
              -F caption="📊 Allure отчёт для ${{ matrix.browser }}"
          else
            echo "Screenshot not found, skip sending"
          fi

  finalize:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Send final completion message
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ github.event.inputs.chat_id }} \
            -d text="✅ Все тесты завершены!%0A📊 Отчёт: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}%0A💡 Можете повторить запрос командой /run"