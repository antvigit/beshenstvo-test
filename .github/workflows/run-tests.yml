name: Run Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Run tests
        run: mvn clean test

      - name: Generate Allure report
        run: mvn allure:report

      - name: Install Playwright
        run: |
          npm install -g playwright
          playwright install

      - name: Take screenshot of Allure report
        run: |
          npx playwright screenshot --viewport-size=1280,720 file://$PWD/target/site/allure-maven-plugin/index.html allure-report.png

      - name: Send screenshot to Telegram
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto \
            -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -F photo=@allure-report.png \
            -F caption="📊 Отчёт Allure по результатам тестов"