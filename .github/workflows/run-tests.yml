name: Run Tests

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Telegram chat ID'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Start Selenium Grid
        run: |
          docker compose up -d
          sleep 10

      - name: Wait for Selenium Grid to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:4444/status | grep -q '"ready":true'; then
              echo "Grid is ready"
              break
            fi
            echo "Waiting for Grid..."
            sleep 2
          done

      - name: Run tests for ${{ matrix.browser }}
        run: |
          mvn clean test -Dbrowser=${{ matrix.browser }} -Dgrid.url=http://localhost:4444/wd/hub || true

      - name: Wait for Allure results
        run: |
          while [ ! -d target/allure-results ] || [ -z "$(ls -A target/allure-results 2>/dev/null)" ]; do
            echo "Waiting for allure-results..."
            sleep 5
          done

      - name: Generate Allure report
        run: mvn allure:report

      - name: Start Python HTTP server
        run: |
          cd target/site/allure-maven-plugin/
          python3 -m http.server 8080 &
          sleep 5

      - name: Install Playwright
        run: |
          npm install -g playwright
          npx playwright install --with-deps chromium

      - name: Take screenshot
        run: |
          npx playwright screenshot \
            --viewport-size=1280,720 \
            --timeout=20000 \
            --wait-for-timeout=5000 \
            http://localhost:8080 \
            allure-report.png

      - name: Send screenshot with link
        run: |
          CAPTION=$(printf "Allure отчёт для %s\n🔗 Ссылка: %s" "${{ matrix.browser }}" "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto \
            -F chat_id=${{ github.event.inputs.chat_id }} \
            -F photo=@allure-report.png \
            --data-urlencode "caption=$CAPTION"

  finalize:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Send final completion message
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ github.event.inputs.chat_id }} \
            -d text="✅ Все тесты завершены!%0A💡 Можете повторить запрос командой /run"