name: Run Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Run tests (always continue)
        run: mvn clean test || true

      - name: Wait for Allure results
        run: |
          echo "Waiting for allure-results..."
          for i in {1..30}; do
            if [ -d target/allure-results ] && [ "$(ls -A target/allure-results 2>/dev/null)" ]; then
              echo "✅ allure-results found!"
              ls -la target/allure-results/
              break
            fi
            echo "⏳ Waiting... (attempt $i)"
            sleep 5
          done

      - name: Generate Allure report (standalone)
        run: |
          npm install -g allure-commandline
          allure generate target/allure-results -o target/allure-report --clean

      - name: Start HTTP server
        run: |
          cd target/allure-report
          python3 -m http.server 8080 &
          sleep 5

      - name: Install Playwright
        run: |
          npm install -g playwright
          npx playwright install --with-deps chromium

      - name: Take screenshot
        run: |
          npx playwright screenshot \
            --viewport-size=1280,720 \
            --timeout=30000 \
            --wait-for-timeout=5000 \
            http://localhost:8080 \
            allure-report.png

      - name: Send screenshot to Telegram
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto \
            -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -F photo=@allure-report.png \
            -F caption="📊 Allure отчёт"