name: Run Tests

on:
  workflow_dispatch:  # Запуск вручную из бота или интерфейса GitHub

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Run tests
        run: mvn clean test

      - name: Send result to Telegram
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="✅ Тесты завершены! Отчёт: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"